<body>

      <button class="sidebar-btn active" data-label="Home" data-href="./">⌂</button>
      <button class="sidebar-btn" data-panel="about" data-label="About">◉</button>

  </aside>
  <main class="container">
    <!-- Post Graph section -->
    <section id="post-graph">
      <div id="graph-hint" style="text-align:center;font-size:0.65rem;color:#2a2a2a;letter-spacing:2px;padding:0.3rem 0;user-select:none">↑ PULL</div>

    <!-- About section -->

      <div class="editorial-header">
        <span class="editorial-label">About</span>
        <h1>ahrism</h1>
        <p>Building Practical Systems.</p>
        <p>알고리즘을 밑바닥부터 이해하고, 소프트웨어 지능과 현실 세계의 접점을 만듭니다.</p>
        <div>
          <span class="tag">Python</span>
          <span class="tag">C++</span>
          <span class="tag">PyTorch</span>
          <span class="tag">OpenCV</span>
          <span class="tag">Linux</span>
          <span class="tag">Docker</span>
        </div>
      </div>

      <h3>관심사</h3>
      <p>실용적인 AI 시스템 개발에 관심이 있습니다. 이론적 토대 위에 실제로 동작하는 것을 만드는 과정을 즐깁니다.</p>

      <h3>프로젝트</h3>
      <div id="projects-container"></div>

      <h3>학력</h3>
      <p>학력 내용을 여기에 추가하세요.</p>
      <p style="margin-top:2rem">
        <a href="./blog/" style="color:#4a62ff;font-size:0.9rem">Blog →</a>
      </p>

  <footer class="container">
    <small>&copy; 2024 ahrism</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
  <script src="./app.js"></script>
  <script src="./graph.js"></script>
  <script>
    (async () => {
      const graphData = await fetchGraph('./blog/graph.json');
      const posts = await fetchPosts('./blog/posts.json');

      // Projects
      fetch('./projects.json')
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(projects => {
          renderProjectCards(projects, document.getElementById('projects-container'));
        })
        .catch(err => console.error('projects.json load failed:', err));
      const hasGraph = graphData && graphData.nodes.length > 1;

      if (hasGraph) {
        initGraph(document.getElementById('graph-container'), graphData, {
          onNodeClick: function (slug) {
            window.location.href = './posts/' + slug + '/';
          },
          userZoomingEnabled: false,
        });
      } else {
        // 그래프 데이터 부족 시 리스트 폴백
        document.getElementById('graph-container').style.display = 'none';
        const fallback = document.getElementById('graph-fallback');
        fallback.style.display = '';
        renderPostList(posts, document.getElementById('posts-container'), './posts/');
      }
    })();
  </script>
  <script>
(function () {
  const gc = document.getElementById('graph-container');
  if (!gc) return;

  const SNAP_THRESHOLD = 80; // px: 이 이상 당기면 확장
  const DEFAULT_VH = window.innerWidth <= 640 ? 40 : 45;
  const EXPANDED_VH = 100;
  const EASE = '0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';

  let expanded = false;
  let startY = 0;
  let dragActive = false;

  function baseH() { return DEFAULT_VH / 100 * window.innerHeight; }

  function setHPx(px) {
    gc.style.transition = 'none';
    gc.style.height = px + 'px';
  }

  function snapTo(vh) {
    gc.style.transition = 'height ' + EASE;
    gc.style.height = vh + 'vh';
  }

  function snapExpand() {
    expanded = true;
    snapTo(EXPANDED_VH);
    document.getElementById('post-graph').classList.add('expanded');
  }

  function snapCollapse() {
    expanded = false;
    snapTo(DEFAULT_VH);
    document.getElementById('post-graph').classList.remove('expanded');
  }

  // ── Touch (mobile) ─────────────────────────────
  document.addEventListener('touchstart', function (e) {
    if (window.scrollY > 2) return;
    startY = e.touches[0].clientY;
    dragActive = true;
  }, { passive: true });

  document.addEventListener('touchmove', function (e) {
    if (!dragActive) return;
    const delta = e.touches[0].clientY - startY; // 양수 = 손가락 아래로 = overscroll 위
    if (delta <= 0) { dragActive = false; return; }
    if (!expanded) {
      setHPx(baseH() + delta * 0.4); // rubber band 감쇠
    }
  }, { passive: true });

  document.addEventListener('touchend', function () {
    if (!dragActive) return;
    dragActive = false;
    if (!expanded) {
      const delta = gc.offsetHeight - baseH();
      if (delta > SNAP_THRESHOLD) {
        snapExpand();
      } else {
        snapCollapse();
      }
    }
  }, { passive: true });

  // ── Scroll (collapse when scrolling down) ──────
  document.addEventListener('scroll', function () {
    if (expanded && window.scrollY > 10) {
      snapCollapse();
    }
  }, { passive: true });

  // ── Wheel (desktop) ────────────────────────────
  document.addEventListener('wheel', function (e) {
    if (e.deltaY < 0 && window.scrollY < 2 && !expanded) {
      snapExpand();
    } else if (e.deltaY > 0 && window.scrollY < 2 && expanded) {
      snapCollapse();
    }
  }, { passive: true });
})();
</script>
  <script src="./sidebar.js"></script>
</body>
</html>
